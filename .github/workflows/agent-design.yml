name: Run Designer Agent
on:
  workflow_dispatch:
  workflow_call:

jobs:
  design:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install Dependencies
        run: |
          pip install -r scripts/agents/requirements.txt

      - name: Run Designer Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_MODEL_DESIGN: anthropic/claude-sonnet-4
        run: python scripts/agents/designer_agent.py
