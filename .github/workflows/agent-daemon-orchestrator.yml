name: Agent Backlog Orchestrator Daemon
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  repository-projects: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run agent pipeline as separate workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: bash scripts/agents/trigger_agent_pipeline.sh "${{ github.ref_name }}"
