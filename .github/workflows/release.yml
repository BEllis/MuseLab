name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: Git tag to build (e.g. v0.2.0)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            cito_rid: linux-x64
          - os: windows-latest
            platform: windows
            cito_rid: win-x64
          - os: macos-latest
            platform: macos
            cito_rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build cito transpiler
        env:
          CITO_RID: ${{ matrix.cito_rid }}
        run: npm run build:cito

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run electron:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: muselab-${{ matrix.platform }}
          path: release/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: inputs.tag != '' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
