name: Run Implementation Agent
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process. Leave empty to process the next eligible issue.
        required: false
        type: string
  workflow_call:
    inputs:
      issue_number:
        required: false
        type: string

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: |
          pip install -r scripts/agents/requirements.txt

      - name: Run Implementation Agent
        env:
          PYTHONUNBUFFERED: "1"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_MODEL_IMPLEMENT: anthropic/claude-sonnet-4
          OPENROUTER_TIMEOUT_IMPLEMENT: "900"
        run: python scripts/agents/implementation_agent.py "${{ inputs.issue_number }}"
