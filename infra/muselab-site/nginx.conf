server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Landing page and static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /designer {
        return 308 /designer/;
    }

    # Designer SPA (client-side routing)
    location /designer/ {
        try_files $uri $uri/ /designer/index.html;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
